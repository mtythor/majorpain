name: Deploy to production
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "refactor/frontend-tokens"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: FrontEnd/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('FrontEnd/package-lock.json') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Install dependencies
        working-directory: FrontEnd
        run: npm ci

      - name: Build
        working-directory: FrontEnd
        env:
          NEXT_PUBLIC_MAJOR_PAIN_WRITE_SECRET: ${{ secrets.MAJOR_PAIN_WRITE_SECRET }}
        run: npm run build

      - name: Save Next.js cache
        uses: actions/cache@v4
        with:
          path: FrontEnd/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('FrontEnd/package-lock.json') }}

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::DEPLOY_HOST and SSH_PRIVATE_KEY secrets must be set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --filter 'P .env' \
            --filter 'P .env.local' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.*' \
            --exclude 'FrontEnd/.next/cache' \
            ./ "root@$DEPLOY_HOST:~/majorpain/"

          ssh -i ~/.ssh/deploy_key "root@$DEPLOY_HOST" "cd ~/majorpain/FrontEnd && pm2 restart major-pain"
          echo "Deploy complete"
