name: Deploy to production
on:
  push:
    branches: [refactor/frontend-tokens]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        working-directory: FrontEnd
        run: npm ci

      - name: Build
        working-directory: FrontEnd
        run: npm run build

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.*' \
            ./ "root@$DEPLOY_HOST:~/majorpain/"

          ssh -i ~/.ssh/deploy_key "root@$DEPLOY_HOST" "cd ~/majorpain/FrontEnd && npm ci && pm2 restart major-pain"
          echo "Deploy complete"
