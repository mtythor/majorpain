<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Score Card Web Component</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Open Sans', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player-score-card-web {
            background-color: #262626;
            border: 1px solid #323232;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 8px;
            position: relative;
            border-radius: 8px;
            width: 800px;
        }

        /* Player Score Bar */
        .player-score-bar {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            position: relative;
            border-radius: 20px 20px 0 0;
            flex-shrink: 0;
            width: 784px;
        }

        .player-tag {
            display: flex;
            gap: 16px;
            height: 64px;
            align-items: center;
            overflow: hidden;
            padding-left: 10px;
            padding-right: 0;
            padding-top: 0;
            padding-bottom: 0;
            position: relative;
            flex-shrink: 0;
            width: 348px;
        }

        .profile-pic-container {
            position: relative;
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            overflow: hidden;
        }

        .profile-pic-image-wrapper {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .profile-pic-image {
            position: absolute;
            height: 100%;
            left: -25.28%;
            max-width: none;
            top: -0.29%;
            width: 156.88%;
        }

        .player-name {
            font-family: 'Open Sans', sans-serif;
            font-weight: 800;
            line-height: normal;
            position: relative;
            flex-shrink: 0;
            font-size: 24px;
            text-align: center;
            white-space: nowrap;
            color: #ffffff;
        }

        .divider-vertical {
            display: flex;
            align-items: center;
            padding-left: 0;
            padding-right: 0;
            padding-top: 8px;
            padding-bottom: 8px;
            position: relative;
            flex-shrink: 0;
            width: 1px;
            align-self: stretch;
        }

        .divider-line {
            background-color: #707070;
            height: 100%;
            flex-shrink: 0;
            width: 1px;
        }

        .player-score {
            display: flex;
            flex-direction: column;
            height: 64px;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 0;
            padding-bottom: 0;
            position: relative;
            flex-shrink: 0;
            width: 92px;
        }

        .player-score-text {
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            line-height: normal;
            position: relative;
            flex-shrink: 0;
            font-size: 16px;
            text-align: center;
            white-space: nowrap;
            color: #ffffff;
        }

        .player-score-total {
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            line-height: normal;
            position: relative;
            flex-shrink: 0;
            font-size: 24px;
            text-align: center;
            white-space: nowrap;
            color: #ffffff;
        }

        /* Player Color Divider */
        .player-color-divider {
            background-color: #74a553;
            height: 1px;
            flex-shrink: 0;
            width: 784px;
        }

        /* Golfer Name Bar */
        .golfer-name-bar {
            display: flex;
            gap: 8px;
            height: 20px;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            width: 784px;
        }

        .golfer-name-tag {
            height: 20px;
            position: relative;
            flex-shrink: 0;
            width: 183.25px;
        }

        .golfer-name-tag-content {
            position: absolute;
            display: flex;
            flex-direction: column;
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            inset: 0;
            justify-content: center;
            line-height: 0;
            font-size: 14px;
            text-align: center;
            color: #ffffff;
        }

        .golfer-name-tag-content p {
            line-height: normal;
        }

        .golfer-name-tag.out {
            color: #707070;
        }

        .golfer-name-tag.out .golfer-name-tag-content {
            color: #707070;
        }

        .divider-vertical-small {
            display: flex;
            height: 100%;
            align-items: center;
            padding-left: 0;
            padding-right: 0;
            padding-top: 4px;
            padding-bottom: 4px;
            position: relative;
            flex-shrink: 0;
            width: 1px;
            align-self: stretch;
        }
    </style>
</head>
